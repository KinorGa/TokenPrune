output_dir: outputs/train/
num_train_epochs: 1
lr_scheduler_type: cosine
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 2e-4
save_strategy: epoch
logging_strategy: steps
save_total_limit: 3
seed: 42
bf16: true
fp16: false
report_to: tensorboard
dataset: data/math/
use_peft: true

peft:
  peft_model_id: data/peft/qwen2.5-1.5b-instruct-lora
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
  bias: none
  inference_mode: false

defaults:
  - _self_
  - models: Qwen2.5-1.5B-Instruct 